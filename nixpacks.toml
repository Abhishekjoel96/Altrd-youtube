[phases.setup]
nixPkgs = ['nodejs-18_x', 'python310', 'python310Packages.pip', 'ffmpeg']

[phases.install] 
cmds = [
  'npm install --legacy-peer-deps',
  'python -m pip install --upgrade pip',
  'cd backend && python -m pip install -r requirements.txt'
]

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'cd backend && python app.py' 